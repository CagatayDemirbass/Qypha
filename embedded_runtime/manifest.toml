snapshot_commit = "c541cde0f66e57531940311c8924d98e4941a9c6"
reference_snapshot_root = "vendor/openclaw_snapshot"
vendored_root = "embedded_runtime"
bridge_root = "embedded_runtime/bridge"

[rules]
rewrite_openclaw_code = false
qypha_owns_policy = true
qypha_owns_sessions = true
qypha_owns_identity = true
qypha_owns_safe_ghost = true
safe_mode_required_for_full_access_ai = true

